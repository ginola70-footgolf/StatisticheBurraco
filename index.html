<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Burraco Battle ♠ ginola700</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,900;1,6..96,400;1,6..96,700&display=swap" rel="stylesheet"/>
  <style>
    /* ── TOKENS ─────────────────────────────────────────────────────────── */
    :root {
      --felt:      #ffffff;
      --felt-mid:  #1e3d31;
      --felt-hi:   #254a3c;
      --gold:      #033618;
      --gold-dim:  rgba(200,168,75,0.18);
      --gold-line: rgba(200,168,75,0.35);
      --cream:     #f2ebdd;
      --cream-dim: rgba(242,235,221,0.55);
      --red:       #bf3030;
      --red-dim:   rgba(191,48,48,0.18);
      --blue:      #4b8ec8;
      --blue-dim:  rgba(75,142,200,0.18);
      --blue-line: rgba(75,142,200,0.35);
      --shadow:    rgba(0,0,0,0.55);
      --radius:    10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--felt);
      background-image:
        radial-gradient(ellipse 80% 60% at 10% 5%,  rgba(37,74,60,.6) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 90% 95%, rgba(10,22,17,.7) 0%, transparent 55%),
        url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.018'%3E%3Cpath d='M0 0h1v1H0z'/%3E%3Cpath d='M20 20h1v1h-1z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      min-height: 100vh;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--cream);
      overflow-x: hidden;
    }

    /* ── HEADER ─────────────────────────────────────────────────────────── */
    header {
      padding: 4rem 1.5rem 2.5rem;
      text-align: center;
      position: relative;
    }
    .deco-suits {
      font-size: 1.1rem;
      letter-spacing: 1.4rem;
      color: var(--gold);
      opacity: .55;
      margin-bottom: 1.2rem;
      animation: fadeUp .7s ease both;
    }
    h1 {
      font-family: 'Bodoni Moda', serif;
      font-weight: 900;
      font-size: clamp(2.6rem, 7vw, 5.2rem);
      line-height: .96;
      color: var(--cream);
      letter-spacing: -.025em;
      animation: fadeUp .7s .08s ease both;
    }
    h1 em {
      display: block;
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-weight: 400;
      font-size: .38em;
      color: var(--gold);
      letter-spacing: .15em;
      margin-top: .35em;
    }
    .ornament {
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: center;
      margin: 1.8rem auto 0;
      animation: fadeUp .7s .18s ease both;
    }
    .ornament-line {
      height: 1px;
      width: 80px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .ornament-line:last-child { background: linear-gradient(90deg, var(--gold), transparent); }
    .ornament-diamond { color: var(--gold); font-size: .9rem; }

    /* ── UPDATE BAR ─────────────────────────────────────────────────────── */
    .update-bar {
      text-align: center;
      font-size: .62rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(242,235,221,.28);
      padding: .5rem 1rem 1.5rem;
    }
    .update-bar b { color: rgba(200,168,75,.6); }

    /* ── REFRESH BUTTON ─────────────────────────────────────────────────── */
    .refresh-wrap {
      text-align: center;
      padding: .5rem 1rem 2rem;
      animation: fadeUp .7s .28s ease both;
    }
    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: .55rem;
      background: transparent;
      border: 1px solid var(--gold-line);
      color: var(--gold);
      font-family: 'IBM Plex Mono', monospace;
      font-size: .68rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      padding: .6rem 1.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background .25s, border-color .25s, transform .15s;
    }
    .btn-refresh:hover { background: var(--gold-dim); border-color: var(--gold); transform: translateY(-1px); }
    .btn-refresh:active { transform: translateY(0); }
    .btn-refresh.loading { opacity: .55; pointer-events: none; }
    .btn-refresh .spin { display: inline-block; }
    .btn-refresh.loading .spin { animation: spin 1s linear infinite; }

    /* ── SINTESI GLOBALE ─────────────────────────────────────────────────── */
    .wrap { max-width: 880px; margin: 0 auto; padding: 0 1rem 5rem; }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.4rem;
      margin-bottom: 2.8rem;
      animation: fadeUp .7s .22s ease both;
    }

    .summary-card {
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }
    .summary-card.zappa {
      border: 1px solid var(--gold-line);
      background: linear-gradient(145deg, rgba(200,168,75,.06), rgba(255,255,255,.02));
    }
    .summary-card.giangi {
      border: 1px solid var(--blue-line);
      background: linear-gradient(145deg, rgba(75,142,200,.07), rgba(255,255,255,.02));
    }

    .sc-header {
      padding: 1.2rem 1.4rem .8rem;
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sc-title {
      font-family: 'Bodoni Moda', serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .summary-card.zappa  .sc-title { color: var(--gold); }
    .summary-card.giangi .sc-title { color: var(--blue); }

    .sc-badge {
      font-size: .55rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: .2rem .6rem;
      border-radius: 3px;
    }
    .zappa  .sc-badge { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold-line); }
    .giangi .sc-badge { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue-line); }

    .sc-body {
      padding: 1.2rem 1.4rem 1.4rem;
    }

    /* scoreboard a 3 col: gin | vs | avversario */
    .sb-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: .5rem;
      margin-bottom: 1rem;
    }
    .sb-player {}
    .sb-player.right { text-align: right; }
    .sb-nick {
      font-size: .62rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(242,235,221,.38);
      margin-bottom: .2rem;
    }
    .sb-wins {
      font-size: 3.2rem;
      font-weight: 300;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -.04em;
    }
    .sb-wins.gold  { color: var(--gold);  text-shadow: 0 0 32px rgba(200,168,75,.3); }
    .sb-wins.blue  { color: var(--blue);  text-shadow: 0 0 32px rgba(75,142,200,.3); }
    .sb-wins.cream { color: var(--cream); }
    .sb-wins.dim   { color: rgba(242,235,221,.25); }

    .sb-vs {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(242,235,221,.2);
      text-align: center;
    }

    /* leader crown */
    .crown { color: var(--gold); font-size: .85rem; display: block; }

    /* progress bar */
    .pb-wrap { margin-bottom: .5rem; }
    .pb-labels {
      display: flex;
      justify-content: space-between;
      font-size: .58rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(242,235,221,.32);
      margin-bottom: .35rem;
    }
    .pb-bar {
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,.07);
      overflow: hidden;
    }
    .pb-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s cubic-bezier(.4,0,.2,1);
    }
    .zappa  .pb-fill { background: linear-gradient(90deg, var(--gold), rgba(200,168,75,.4)); }
    .giangi .pb-fill { background: linear-gradient(90deg, var(--blue), rgba(75,142,200,.4)); }

    .sc-meta {
      font-size: .6rem;
      color: rgba(242,235,221,.28);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: .7rem;
    }
    .sc-meta b { color: rgba(242,235,221,.5); font-weight: 500; }

    /* ── TAB SWITCHER ────────────────────────────────────────────────────── */
    .section-head {
      font-family: 'Bodoni Moda', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: .06em;
      margin: 2.8rem 0 1.1rem;
      display: flex;
      align-items: center;
      gap: .8rem;
    }
    .section-head::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--gold-line), transparent);
    }

    .tab-bar {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.3rem;
    }
    .tab-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      padding: .45rem 1.1rem;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,.1);
      background: transparent;
      color: rgba(242,235,221,.38);
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn:hover { color: var(--cream); border-color: rgba(255,255,255,.25); }
    .tab-btn.active-zappa  { background: var(--gold-dim); border-color: var(--gold-line); color: var(--gold); }
    .tab-btn.active-giangi { background: var(--blue-dim); border-color: var(--blue-line); color: var(--blue); }

    /* ── GIORNO CARD ─────────────────────────────────────────────────────── */
    .giorno {
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--radius);
      margin-bottom: .65rem;
      overflow: hidden;
      background: rgba(255,255,255,.03);
      transition: border-color .25s, background .25s;
      animation: fadeSlide .45s ease both;
    }
    .list-zappa  .giorno:hover { border-color: var(--gold-line); background: rgba(255,255,255,.055); }
    .list-giangi .giorno:hover { border-color: var(--blue-line); background: rgba(75,142,200,.04); }

    .giorno-head {
      display: flex;
      align-items: center;
      padding: .9rem 1.2rem;
      cursor: pointer;
      gap: .8rem;
      user-select: none;
    }
    .g-date {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--gold);
      min-width: 110px;
    }
    .list-giangi .g-date { color: var(--blue); }

    .g-score-row {
      flex: 1;
      display: flex;
      align-items: baseline;
      gap: .55rem;
    }
    .g-player { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(242,235,221,.4); }
    .g-n {
      font-size: 1.55rem;
      font-weight: 300;
      color: var(--cream);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .g-n.hi-gold  { color: var(--gold); font-weight: 500; }
    .g-n.hi-blue  { color: var(--blue); font-weight: 500; }
    .g-n.lo       { color: rgba(242,235,221,.28); }
    .g-dash { color: rgba(242,235,221,.2); }
    .g-meta { font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(242,235,221,.28); }
    .g-arrow { color: rgba(200,168,75,.38); font-size: .7rem; transition: transform .3s; }
    .list-giangi .g-arrow { color: rgba(75,142,200,.38); }
    .giorno.open .g-arrow { transform: rotate(180deg); }

    .giorno-body { max-height: 0; overflow: hidden; transition: max-height .4s ease; }
    .giorno.open .giorno-body { max-height: 2000px; }

    .match-list {
      border-top: 1px solid rgba(255,255,255,.06);
      padding: .5rem 1.2rem .9rem;
    }
    .match-row {
      display: grid;
      grid-template-columns: 1.5rem 1fr auto auto auto 1fr auto;
      align-items: center;
      gap: .5rem;
      padding: .42rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      font-size: .76rem;
    }
    .match-row:last-child { border-bottom: none; }
    .m-num   { color: rgba(242,235,221,.22); font-size: .62rem; }
    .m-name  { color: rgba(242,235,221,.55); }
    .m-name.vince { color: var(--cream); font-weight: 500; }
    .m-score { font-variant-numeric: tabular-nums; font-size: .88rem; color: var(--cream); text-align: right; }
    .m-score.w-gold  { color: var(--gold); }
    .m-score.w-blue  { color: var(--blue); }
    .m-score.l       { color: rgba(242,235,221,.3); }
    .m-sep   { color: rgba(242,235,221,.18); font-size: .65rem; text-align: center; }
    .m-badge { font-size: .58rem; padding: .12rem .42rem; border-radius: 3px; letter-spacing: .07em; text-align: center; }
    .badge-g { background: rgba(200,168,75,.14); color: var(--gold); border: 1px solid rgba(200,168,75,.28); }
    .badge-o { background: rgba(75,142,200,.14); color: var(--blue); border: 1px solid rgba(75,142,200,.28); }
    .badge-oz { background: rgba(191,48,48,.12); color: #e07070; border: 1px solid rgba(191,48,48,.25); }

    /* ── STATO ────────────────────────────────────────────────────────────── */
    .stato {
      border: 1px solid rgba(255,255,255,.07);
      border-radius: var(--radius);
      padding: 3rem 2rem;
      text-align: center;
    }
    .stato-icon { font-size: 2.5rem; display: block; margin-bottom: .9rem; }
    .stato-msg  { font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 1.1rem; color: rgba(242,235,221,.45); }
    .stato-sub  { font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: rgba(242,235,221,.22); margin-top: .5rem; }
    .dot { display: inline-block; animation: blink 1.3s infinite; color: var(--gold); }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    /* ── FOOTER ──────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem 1rem 2.5rem;
      font-size: .6rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(242,235,221,.18);
    }
    footer .f-suits { display: block; color: var(--gold); opacity: .3; font-size: .9rem; letter-spacing: .8rem; margin-bottom: .4rem; }

    /* ── ANIMATIONS ──────────────────────────────────────────────────────── */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeSlide{ from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
    @keyframes blink    { 0%,80%,100% { opacity:.2; } 40% { opacity:1; } }
    @keyframes spin     { to { transform:rotate(360deg); } }

    /* ── RESPONSIVE ──────────────────────────────────────────────────────── */
    @media (max-width: 620px) {
      .summary-grid { grid-template-columns: 1fr; }
      .sb-wins { font-size: 2.5rem; }
      .match-row { grid-template-columns: 1.2rem 1fr auto auto auto; }
      .match-row .m-name:last-of-type, .match-row .m-badge { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="deco-suits">♠ ♥ ♦ ♣</div>
  <h1>Burraco Battle<em>ginola700 · le sfide</em></h1>
  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond">◆</div>
    <div class="ornament-line"></div>
  </div>
</header>

<div class="update-bar">
  Aggiornato: <b id="ts">—</b> &nbsp;·&nbsp; refresh automatico ogni giorno
</div>

<!-- REFRESH BUTTON -->
<div class="refresh-wrap">
  <button class="btn-refresh" id="btn-refresh" onclick="manualRefresh()">
    <span class="spin" id="spin-icon">⟳</span>
    Aggiorna dati
  </button>
</div>

<!-- SINTESI DOPPIA -->
<div class="wrap">
  <div class="section-head">♠ Sintesi Generale</div>
  <div class="summary-grid" id="summary-grid">
    <div class="stato">
      <span class="stato-icon"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></span>
      <p class="stato-msg">Caricamento...</p>
    </div>
  </div>

  <!-- DETTAGLIO PER GIORNO -->
  <div class="section-head">♣ Riepilogo Giornaliero</div>
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active-zappa" onclick="switchTab('zappaclaud')">vs zappaclaud</button>
    <button class="tab-btn" onclick="switchTab('Giangi72')">vs Giangi72</button>
  </div>

  <div id="list-zappaclaud" class="list-zappa">
    <div class="stato">
      <span class="stato-icon"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></span>
      <p class="stato-msg">Caricamento partite...</p>
    </div>
  </div>
  <div id="list-Giangi72" class="list-giangi" style="display:none">
    <div class="stato">
      <span class="stato-icon"><span class="dot">•</span><span class="dot">•</span><span class="dot">•</span></span>
      <p class="stato-msg">Caricamento partite...</p>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <span class="f-suits">♠ ♥ ♦ ♣</span>
  dati da burracoepinelle.com · aggiornamento automatico via github actions
</footer>

<script>
const P1 = 'ginola700';
let currentTab = 'zappaclaud';

/* ── TAB ────────────────────────────────────────────────────────────────── */
function switchTab(opponent) {
  currentTab = opponent;
  // lista
  document.querySelectorAll('[id^="list-"]').forEach(el => el.style.display = 'none');
  document.getElementById('list-' + opponent).style.display = '';
  // bottoni
  const tabs = document.querySelectorAll('.tab-btn');
  tabs[0].className = 'tab-btn' + (opponent === 'zappaclaud' ? ' active-zappa' : '');
  tabs[1].className = 'tab-btn' + (opponent === 'Giangi72'   ? ' active-giangi' : '');
}

/* ── RENDER SINTESI ─────────────────────────────────────────────────────── */
function renderSummary(data) {
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = '';

  const opponents = [
    { key: 'zappaclaud', cls: 'zappa',  accentCls: 'gold', badgeLabel: '♥ avversario 1' },
    { key: 'Giangi72',   cls: 'giangi', accentCls: 'blue', badgeLabel: '♦ avversario 2' },
  ];

  opponents.forEach(opp => {
    const av = data.avversari && data.avversari[opp.key];
    if (!av) return;
    const t = av.totali;
    const gPct = t.totale_partite > 0 ? Math.round(t.ginola_vittorie / t.totale_partite * 100) : 50;
    const oPct = 100 - gPct;
    const ginoleads = t.ginola_vittorie > t.opponent_vittorie;
    const oppLeads  = t.opponent_vittorie > t.ginola_vittorie;

    const card = document.createElement('div');
    card.className = `summary-card ${opp.cls}`;
    card.innerHTML = `
      <div class="sc-header">
        <div class="sc-title">vs ${opp.key}</div>
        <div class="sc-badge">${opp.badgeLabel}</div>
      </div>
      <div class="sc-body">
        <div class="sb-row">
          <div class="sb-player">
            <div class="sb-nick">ginola700</div>
            <div class="sb-wins ${ginoleads ? opp.accentCls : oppLeads ? 'dim' : 'cream'}">
              ${t.ginola_vittorie}
            </div>
            ${ginoleads ? '<span class="crown">♛</span>' : ''}
          </div>
          <div class="sb-vs">vs</div>
          <div class="sb-player right">
            <div class="sb-nick">${opp.key}</div>
            <div class="sb-wins ${oppLeads ? opp.accentCls : ginoleads ? 'dim' : 'cream'}">
              ${t.opponent_vittorie}
            </div>
            ${oppLeads ? '<span class="crown" style="text-align:right">♛</span>' : ''}
          </div>
        </div>
        <div class="pb-wrap">
          <div class="pb-labels">
            <span>gin ${gPct}%</span>
            <span>${oPct}% ${opp.key.substring(0,4)}</span>
          </div>
          <div class="pb-bar"><div class="pb-fill" style="width:${gPct}%"></div></div>
        </div>
        <div class="sc-meta">
          <b>${t.totale_partite}</b> partite totali &nbsp;·&nbsp;
          <b>${t.giorni_giocati}</b> giorni giocati
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

/* ── RENDER LISTA GIORNI ────────────────────────────────────────────────── */
function renderDays(perGiorno, containerId, oppKey, colorCls) {
  const list = document.getElementById(containerId);
  if (!perGiorno || perGiorno.length === 0) {
    list.innerHTML = `<div class="stato">
      <span class="stato-icon">🃏</span>
      <p class="stato-msg">Nessuna partita trovata</p>
      <p class="stato-sub">Nessuna partita registrata vs ${oppKey}</p>
    </div>`;
    return;
  }

  const isGold = colorCls === 'gold';
  const winCls  = isGold ? 'w-gold' : 'w-blue';
  const hiCls   = isGold ? 'hi-gold' : 'hi-blue';
  const oppInit = oppKey.substring(0, 3).toUpperCase();

  list.innerHTML = '';
  perGiorno.forEach((g, idx) => {
    const gV = g.ginola_vittorie, oV = g.opponent_vittorie;
    const gWin = gV > oV, oWin = oV > gV;
    const n = g.n_partite || (gV + oV);

    const card = document.createElement('div');
    card.className = 'giorno';
    card.style.animationDelay = (idx * 0.04) + 's';

    const matchRows = (g.partite || []).map((p, i) => {
      const gw = p.winner === P1;
      return `<div class="match-row">
        <span class="m-num">${i+1}</span>
        <span class="m-name ${gw ? 'vince' : ''}">${P1}</span>
        <span class="m-score ${gw ? winCls : 'l'}">${p.ginola_score}</span>
        <span class="m-sep">—</span>
        <span class="m-score ${!gw ? winCls : 'l'}">${p.opponent_score}</span>
        <span class="m-name ${!gw ? 'vince' : ''}">${oppKey}</span>
        <span class="m-badge ${gw ? 'badge-g' : (isGold ? 'badge-oz' : 'badge-o')}">${gw ? 'G' : oppInit}</span>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="giorno-head" onclick="toggle(this)">
        <div class="g-date">${g.data}</div>
        <div class="g-score-row">
          <span class="g-player">gin</span>
          <span class="g-n ${gWin ? hiCls : oWin ? 'lo' : ''}">${gV}</span>
          <span class="g-dash">—</span>
          <span class="g-n ${oWin ? hiCls : gWin ? 'lo' : ''}">${oV}</span>
          <span class="g-player">${oppKey.substring(0,4)}</span>
        </div>
        <div class="g-meta">${n} partite</div>
        <span class="g-arrow">▼</span>
      </div>
      <div class="giorno-body">
        ${matchRows ? '<div class="match-list">' + matchRows + '</div>' : ''}
      </div>`;
    list.appendChild(card);
  });
}

function toggle(head) {
  head.closest('.giorno').classList.toggle('open');
}

/* ── RENDER PRINCIPALE ──────────────────────────────────────────────────── */
function renderData(d) {
  // timestamp
  if (d.aggiornato) {
    const dt = new Date(d.aggiornato);
    document.getElementById('ts').textContent =
      dt.toLocaleDateString('it-IT') + ' · ' +
      dt.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'}) + ' UTC' +
      (d._demo ? '  ⚠ dati demo' : '');
  }

  renderSummary(d);

  // Liste giornaliere per ciascun avversario
  const opp1 = d.avversari && d.avversari['zappaclaud'];
  const opp2 = d.avversari && d.avversari['Giangi72'];
  if (opp1) renderDays(opp1.per_giorno, 'list-zappaclaud', 'zappaclaud', 'gold');
  if (opp2) renderDays(opp2.per_giorno, 'list-Giangi72',   'Giangi72',   'blue');
}

/* ── FETCH ──────────────────────────────────────────────────────────────── */
async function load() {
  try {
    const r = await fetch('partite.json?_=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    renderData(await r.json());
  } catch {
    renderData(demo());
    document.getElementById('ts').textContent += '  — ⚠ partite.json non trovato, mostro dati demo';
  }
}

load();
setInterval(load, 60 * 60 * 1000);

/* ── REFRESH MANUALE ────────────────────────────────────────────────────── */
const GITHUB_REPO  = "ginola70-footgolf/StatisticheBurraco";
const GITHUB_TOKEN = "";

async function manualRefresh() {
  const btn  = document.getElementById('btn-refresh');
  const icon = document.getElementById('spin-icon');
  btn.classList.add('loading');
  btn.textContent = '';
  btn.appendChild(icon);
  btn.append(' Aggiornamento…');

  if (GITHUB_REPO && GITHUB_TOKEN) {
    try {
      const resp = await fetch(
        `https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/update.yml/dispatches`,
        { method:'POST', headers:{ 'Authorization':`Bearer ${GITHUB_TOKEN}`, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' }, body: JSON.stringify({ref:'main'}) }
      );
      if (resp.ok || resp.status === 204) {
        btn.textContent = '';
        btn.appendChild(icon);
        btn.append(' Action avviata! Attendi ~30s…');
        setTimeout(() => { load(); resetBtn(); }, 35000);
        return;
      }
    } catch(e) { console.warn('GitHub dispatch fallito:', e); }
  }

  await load();
  resetBtn();
}

function resetBtn() {
  const btn  = document.getElementById('btn-refresh');
  const icon = document.getElementById('spin-icon');
  btn.classList.remove('loading');
  btn.textContent = '';
  btn.appendChild(icon);
  btn.append(' Aggiorna dati');
}
